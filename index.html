<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AvMap">
  <title>Aviation Route Map</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header">
    <div id="header-top">
      <div style="display:flex;align-items:baseline;gap:6px;">
        <span class="app-title">✈ AVMAP</span>
        <span id="app-version">Ver.260527.1</span>
      </div>
      <div id="header-controls">
        <button id="caug-toggle-btn">Airport</button>
        <button id="fir-toggle-btn">FIR</button>
        <button id="gps-btn">📍</button>
        <button id="cloud-btn">☁</button>
      </div>
      <button id="header-collapse-btn">▲</button>
    </div>
    <div id="header-body">
      <div id="route-toggles"></div>
    </div>
  </div>

  <div id="map"></div>

  <div id="fir-panel" class="hidden"></div>
  <div id="route-memo-panel" class="hidden"></div>
  <div id="cloud-backdrop" class="hidden"></div>
  <div id="cloud-panel" class="hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/fir-boundaries.js"></script>
  <script src="data/airports_caug.js"></script>
  <script src="data/routes.js"></script>
  <script src="data/routes_ofp.js"></script>
  <script src="data/caug_notes_24.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
